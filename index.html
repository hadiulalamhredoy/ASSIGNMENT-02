<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cocktail Hub</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body class="bg-light">

    <nav class="navbar navbar-dark bg-dark mb-4 p-3">
        <div class="container d-flex justify-content-between">
            <a class="navbar-brand fw-bold" href="#">🍹 Cocktail Hub</a>
            <div class="d-flex w-50">
                <input id="search-input" class="form-control me-2" type="search" placeholder="Search for a drink..."
                    aria-label="Search">
                <button id="search-btn" class="btn btn-outline-light" type="button">Search</button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="row">

            <div class="col-lg-8 mb-4">
                <h3 class="mb-3">Drinks Menu</h3>

                <div id="not-found-msg" class="alert alert-danger d-none" role="alert">
                
                </div>

                <div id="drinks-container" class="row g-3">
                </div>
            </div>

            <div class="col-lg-4">
                <div class="card shadow-sm sticky-top" style="top: 20px;">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Group Selection</h5>
                    </div>
                    <div class="card-body">
                        <h6 class="fw-bold">Total Drinks Added: <span id="drink-count"
                                class="badge bg-success fs-6">0</span></h6>
                        <hr>
                        <ol id="group-list" class="list-group list-group-numbered">
                        </ol>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="modal fade" id="detailsModal" tabindex="-1" aria-labelledby="detailsModalLabel" aria-hidden="true">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header bg-info text-dark">
                    <h5 class="modal-title fw-bold" id="modal-title">Drink Details</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <div class="text-center mb-3">
                        <img id="modal-img" src="" alt="Drink Image" class="img-fluid rounded"
                            style="max-height: 250px;">
                    </div>
                    <ul class="list-group">
                        <li class="list-group-item"><strong>Name:</strong> <span id="modal-name"></span></li>
                        <li class="list-group-item"><strong>Category:</strong> <span id="modal-category"></span></li>
                        <li class="list-group-item"><strong>Type:</strong> <span id="modal-alcoholic"></span></li>
                        <li class="list-group-item"><strong>Glass:</strong> <span id="modal-glass"></span></li>
                        <li class="list-group-item"><strong>Instructions:</strong> <span id="modal-instructions"></span>
                        </li>
                    </ul>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Close</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="app.js"></script>
</body>

</html>
